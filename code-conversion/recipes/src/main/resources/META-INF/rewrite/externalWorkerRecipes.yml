type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllExternalWorkerPrepareRecipes
displayName: Runs all external worker prepare recipes
description: Injects job worker and migrate typed value API.
recipeList:
  # Camunda 8.9 split the Spring Boot starter: the default `camunda-spring-boot-starter`
  # requires Spring Boot 4.0.x, while `camunda-spring-boot-3-starter` targets Spring Boot 3.5.x.
  # They are mutually exclusive - add exactly one. We default to the Spring Boot 3 starter as the
  # safer landing spot for migrated Camunda 7 apps; it pulls in camunda-client-java transitively.
  - org.openrewrite.java.dependencies.AddDependency:
      groupId: io.camunda
      artifactId: camunda-spring-boot-3-starter
      version: ${version.camunda-8}
  - io.camunda.migration.code.recipes.sharedRecipes.ReplaceTypedValueAPIRecipe
  - io.camunda.migration.code.recipes.external.PrepareJobWorkerBeneathExternalWorkerRecipe
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllExternalWorkerMigrateRecipes
displayName: Runs all external worker migration recipes
description: Migrates external worker methods to job worker methods.
recipeList:
  - io.camunda.migration.code.recipes.external.MigrateExternalWorkerRecipe
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllExternalWorkerCleanupRecipes
displayName: Runs all external worker cleanup recipes
description: Removes external worker code and unused imports.
recipeList:
  - io.camunda.migration.code.recipes.external.CleanupExternalWorkerRecipe
  - org.openrewrite.java.RemoveUnusedImports
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllExternalWorkerRecipes
displayName: Runs all external worker recipes in order
description: Migrates external worker to job worker.
recipeList:
  - io.camunda.migration.code.recipes.AllExternalWorkerPrepareRecipes
  - io.camunda.migration.code.recipes.AllExternalWorkerMigrateRecipes
  - io.camunda.migration.code.recipes.AllExternalWorkerCleanupRecipes