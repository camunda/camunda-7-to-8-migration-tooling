type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllDelegatePrepareRecipes
displayName: Runs all delegate prepare recipes
description: Injects job worker and migrate typed value API.
recipeList:
  # Camunda 8.9 split the Spring Boot starter: the default `camunda-spring-boot-starter`
  # requires Spring Boot 4.0.x, while `camunda-spring-boot-3-starter` targets Spring Boot 3.5.x.
  # They are mutually exclusive - add exactly one. We default to the Spring Boot 3 starter as the
  # safer landing spot for migrated Camunda 7 apps; it pulls in camunda-client-java transitively.
  - org.openrewrite.java.dependencies.AddDependency:
      groupId: io.camunda
      artifactId: camunda-spring-boot-3-starter
      version: ${version.camunda-8}
  - io.camunda.migration.code.recipes.sharedRecipes.ReplaceTypedValueAPIRecipe
  - io.camunda.migration.code.recipes.delegate.PrepareJobWorkerBeneathDelegateRecipe
  - io.camunda.migration.code.recipes.delegate.PrepareJobWorkerBeneathExecutionListenerRecipe
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllDelegateMigrateRecipes
displayName: Runs all delegate migrate recipes
description: Migrates delegate methods to job worker methods.
recipeList:
  - io.camunda.migration.code.recipes.delegate.MigrateExecutionRecipe
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllDelegateCleanupRecipes
displayName: Runs all delegate cleanup recipes
description: Removes delegate code and unused imports.
recipeList:
  - io.camunda.migration.code.recipes.delegate.CleanupDelegateRecipe
  - io.camunda.migration.code.recipes.delegate.CleanupExecutionListenerRecipe
  - org.openrewrite.java.RemoveUnusedImports
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllDelegateRecipes
displayName: Runs all delegate recipes in order
description: Migrates delegate to job worker.
recipeList:
  - io.camunda.migration.code.recipes.AllDelegatePrepareRecipes
  - io.camunda.migration.code.recipes.AllDelegateMigrateRecipes
  - io.camunda.migration.code.recipes.AllDelegateCleanupRecipes