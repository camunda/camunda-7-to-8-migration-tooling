type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllClientPrepareRecipes
displayName: Runs all delegate cleanup recipes
description: Removes delegate code and unused imports.
recipeList:
  # Camunda 8.9 split the Spring Boot starter: the default `camunda-spring-boot-starter`
  # requires Spring Boot 4.0.x, while `camunda-spring-boot-3-starter` targets Spring Boot 3.5.x.
  # They are mutually exclusive - add exactly one. We default to the Spring Boot 3 starter as the
  # safer landing spot for migrated Camunda 7 apps; it pulls in camunda-client-java transitively.
  - org.openrewrite.java.dependencies.AddDependency:
      groupId: io.camunda
      artifactId: camunda-spring-boot-3-starter
      version: ${version.camunda-8}
  - io.camunda.migration.code.recipes.client.PrepareCamundaClientDependencyRecipe
  - io.camunda.migration.code.recipes.sharedRecipes.ReplaceTypedValueAPIRecipe
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllClientMigrateRecipes
displayName: Runs all delegate cleanup recipes
description: Removes delegate code and unused imports.
recipeList:
  - io.camunda.migration.code.recipes.client.MigrateSignalMethodsRecipe
  - io.camunda.migration.code.recipes.client.MigrateCancelProcessInstanceMethodsRecipe
  - io.camunda.migration.code.recipes.client.MigrateStartProcessInstanceMethodsRecipe
  - io.camunda.migration.code.recipes.client.MigrateMessageMethodsRecipe
  - io.camunda.migration.code.recipes.client.MigrateUserTaskMethodsRecipe
  - io.camunda.migration.code.recipes.client.MigrateProcessInstanceQueryMethodsRecipe
  - io.camunda.migration.code.recipes.client.DetectHistoryServiceUsageRecipe
  - io.camunda.migration.code.recipes.testing.ReplaceAssertionsRecipe
  # Match the Spring Boot 3 starter chosen above: camunda-process-test-spring defaults to
  # Spring Boot 4.0.x since 8.9, so use the dedicated Spring Boot 3 module for test scope.
  - org.openrewrite.java.dependencies.AddDependency:
      groupId: io.camunda
      artifactId: camunda-process-test-spring-boot-3
      version: ${version.camunda-8}
      scope: test
  - org.openrewrite.java.UseStaticImport:
      methodPattern: io.camunda.process.test.api.CamundaAssert assertThat(..)
  - org.openrewrite.java.UseStaticImport:
      methodPattern: io.camunda.process.test.api.assertions.UserTaskSelectors byTaskName(..)
  - org.openrewrite.java.ReplaceAnnotation:
      annotationPatternToReplace: "@org.camunda.bpm.spring.boot.starter.annotation.EnableProcessApplication"
      annotationTemplateToInsert: "@io.camunda.client.annotation.Deployment(resources = \"classpath*:/bpmn/**/*.bpmn\")"
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllClientCleanupRecipes
displayName: Runs all delegate cleanup recipes
description: Removes delegate code and unused imports.
recipeList:
  - io.camunda.migration.code.recipes.client.CleanupEngineDependencyRecipe
  - io.camunda.migration.code.recipes.client.DeleteProcessesXmlRecipe
  - org.openrewrite.java.RemoveUnusedImports
---
type: specs.openrewrite.org/v1beta/recipe
name: io.camunda.migration.code.recipes.AllClientRecipes
displayName: Runs all client recipes
description: Runs all client recipes.
recipeList:
  - io.camunda.migration.code.recipes.AllClientPrepareRecipes
  - io.camunda.migration.code.recipes.AllClientMigrateRecipes
  - io.camunda.migration.code.recipes.AllClientCleanupRecipes
  # Migrate the Spring Boot configuration file (camunda.bpm.* -> camunda.client.*).
  # Unambiguous cleanup, so it runs as part of the standard client migration.
  - io.camunda.migration.code.recipes.MigrateApplicationPropertiesRecipe