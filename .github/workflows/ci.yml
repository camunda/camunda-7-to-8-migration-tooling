name: CI
on:
  push:
    branches:
      - main
      - maintenance/*
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1-5"  # Weekday mornings for general CI

jobs:
  # Read Camunda 8 versions from pom.xml to avoid hard-coding in CI
  read-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      camunda-8-version: ${{ steps.versions.outputs.camunda-8-version }}
      camunda-8-previous-version: ${{ steps.versions.outputs.camunda-8-previous-version }}
      camunda-8-docker-image-version: ${{ steps.versions.outputs.camunda-8-docker-image-version }}
      camunda-8-previous-docker-image-version: ${{ steps.versions.outputs.camunda-8-previous-docker-image-version }}
      camunda-versions: ${{ steps.versions.outputs.camunda-versions }}
    steps:
      - name: Checkout pom.xml
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          sparse-checkout: pom.xml
          sparse-checkout-cone-mode: false

      - name: Extract Camunda 8 versions from pom.xml
        id: versions
        run: |
          CURRENT=$(sed -n 's/.*<version\.camunda-8>\([^<]*\)<\/version\.camunda-8>.*/\1/p' pom.xml)
          PREVIOUS=$(sed -n 's/.*<version\.camunda-8\.previous>\([^<]*\)<\/version\.camunda-8\.previous>.*/\1/p' pom.xml)
          
          if [ -z "$CURRENT" ]; then
            echo "::error::Failed to extract <version.camunda-8> from pom.xml"
            exit 1
          fi
          
          if [ -z "$PREVIOUS" ]; then
            echo "::error::Failed to extract <version.camunda-8.previous> from pom.xml"
            exit 1
          fi

          # Docker image version: for SNAPSHOT versions, current uses SNAPSHOT and previous uses MAJOR.MINOR-SNAPSHOT
          # For release versions (no -SNAPSHOT suffix), the Docker tag equals the Maven version as-is
          if echo "$CURRENT" | grep -q '\-SNAPSHOT$'; then
            CURRENT_DOCKER="SNAPSHOT"
          else
            CURRENT_DOCKER="$CURRENT"
          fi
          PREVIOUS_DOCKER=$(echo "$PREVIOUS" | sed 's/\([0-9]*\.[0-9]*\)\.[0-9]*-SNAPSHOT/\1-SNAPSHOT/')

          echo "camunda-8-version=${CURRENT}" >> $GITHUB_OUTPUT
          echo "camunda-8-previous-version=${PREVIOUS}" >> $GITHUB_OUTPUT
          echo "camunda-8-docker-image-version=${CURRENT_DOCKER}" >> $GITHUB_OUTPUT
          echo "camunda-8-previous-docker-image-version=${PREVIOUS_DOCKER}" >> $GITHUB_OUTPUT
          echo "camunda-versions=[\"${CURRENT}\",\"${PREVIOUS}\"]" >> $GITHUB_OUTPUT

          echo "Camunda 8 current: ${CURRENT} (docker: ${CURRENT_DOCKER})"
          echo "Camunda 8 previous: ${PREVIOUS} (docker: ${PREVIOUS_DOCKER})"

  # Detect changed module surfaces and derive default test scopes for PRs.
  # For non-PR events we execute the full CI surface.
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      data-migrator: ${{ steps.filter.outputs.data-migrator }}
      code-conversion: ${{ steps.filter.outputs.code-conversion }}
      diagram-converter: ${{ steps.filter.outputs.diagram-converter }}
      shared: ${{ steps.filter.outputs.shared }}
      run-runtime: ${{ steps.filter.outputs.run-runtime }}
      run-history: ${{ steps.filter.outputs.run-history }}
      run-identity: ${{ steps.filter.outputs.run-identity }}
      run-e2e: ${{ steps.filter.outputs.run-e2e }}
      run-compile-previous-version: ${{ steps.filter.outputs.run-compile-previous-version }}
      run-db-default: ${{ steps.filter.outputs.run-db-default }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Detect changed scopes and default checks
        id: filter
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT: ${{ github.event_name }}
        run: |
          if [[ "$EVENT" != "pull_request" ]]; then
            echo "data-migrator=true" >> "$GITHUB_OUTPUT"
            echo "code-conversion=true" >> "$GITHUB_OUTPUT"
            echo "diagram-converter=true" >> "$GITHUB_OUTPUT"
            echo "shared=true" >> "$GITHUB_OUTPUT"
            echo "run-runtime=true" >> "$GITHUB_OUTPUT"
            echo "run-history=true" >> "$GITHUB_OUTPUT"
            echo "run-identity=true" >> "$GITHUB_OUTPUT"
            echo "run-e2e=true" >> "$GITHUB_OUTPUT"
            echo "run-compile-previous-version=true" >> "$GITHUB_OUTPUT"
            echo "run-db-default=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${BASE_REF}" --depth=1
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if echo "$CHANGED_FILES" | grep -qE '^(data-migrator/|pom\.xml$)'; then
            echo "data-migrator=true" >> "$GITHUB_OUTPUT"
          else
            echo "data-migrator=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^(code-conversion/|pom\.xml$)'; then
            echo "code-conversion=true" >> "$GITHUB_OUTPUT"
          else
            echo "code-conversion=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^(diagram-converter/|pom\.xml$)'; then
            echo "diagram-converter=true" >> "$GITHUB_OUTPUT"
          else
            echo "diagram-converter=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^(\.github/|pom\.xml$)'; then
            echo "shared=true" >> "$GITHUB_OUTPUT"
          else
            echo "shared=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^(data-migrator/|\.github/|pom\.xml$)'; then
            echo "run-runtime=true" >> "$GITHUB_OUTPUT"
            echo "run-history=true" >> "$GITHUB_OUTPUT"
            echo "run-identity=true" >> "$GITHUB_OUTPUT"
            echo "run-e2e=true" >> "$GITHUB_OUTPUT"
            echo "run-db-default=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-runtime=false" >> "$GITHUB_OUTPUT"
            echo "run-history=false" >> "$GITHUB_OUTPUT"
            echo "run-identity=false" >> "$GITHUB_OUTPUT"
            echo "run-e2e=false" >> "$GITHUB_OUTPUT"
            echo "run-db-default=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^(data-migrator/|code-conversion/|diagram-converter/|\.github/|pom\.xml$)'; then
            echo "run-compile-previous-version=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-compile-previous-version=false" >> "$GITHUB_OUTPUT"
          fi

  distro:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 70
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.data-migrator == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    outputs:
      maven-cache-hit: ${{ steps.setup-maven.outputs.maven-cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        id: setup-maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Build data-migrator distribution
        working-directory: data-migrator
        run: mvn clean install -Dmaven.test.skip --batch-mode

      - name: Upload distro
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: distro
          path: |
            data-migrator/assembly/target/camunda-7-to-8-data-migrator-*.tar.gz
            data-migrator/assembly/target/camunda-7-to-8-data-migrator-*.zip
          if-no-files-found: error
          retention-days: 7

  code-conversion:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.code-conversion == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    outputs:
      maven-cache-hit: ${{ steps.setup-maven.outputs.maven-cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;
            secret/data/products/cambpm/ci/harbor username | HARBOR_USERNAME;
            secret/data/products/cambpm/ci/harbor password | HARBOR_PASSWORD;

      - name: Setup Maven
        id: setup-maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Login to Camunda Registry
        uses: docker/login-action@v4
        with:
          registry: registry.camunda.cloud
          username: ${{ steps.secrets.outputs.HARBOR_USERNAME }}
          password: ${{ steps.secrets.outputs.HARBOR_PASSWORD }}

      - name: Build code-conversion module
        working-directory: code-conversion
        run: mvn verify -PcheckFormat --batch-mode

      - name: Set up Node.js for pattern validation
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24

      - name: Install pattern dependencies
        working-directory: code-conversion/patterns
        run: npm install

      - name: Validate pattern catalog is up-to-date
        working-directory: code-conversion/patterns
        run: |
          echo "Generating pattern catalog..."
          node generate-catalog.js
          node generate-all-in-one.js
          
          echo "Checking if catalog files are in sync..."
          if ! git diff --exit-code README.md ALL_IN_ONE.md; then
            echo "❌ Pattern catalog is out of sync!"
            exit 1
          fi
          echo "✅ Pattern catalog is up-to-date!"

      - name: Build api-mapping frontend
        working-directory: code-conversion/api-mapping
        run: |
          npm ci
          npm run build

      - name: Upload code-conversion artifacts
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: code-conversion
          path: code-conversion/recipes/target/camunda-7-to-8-code-conversion-recipes-*.jar
          if-no-files-found: error
          retention-days: 7

  diagram-converter:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.diagram-converter == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    outputs:
      maven-cache-hit: ${{ steps.setup-maven.outputs.maven-cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        id: setup-maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Build and test diagram-converter module
        working-directory: diagram-converter
        run: mvn verify -Pdistro,checkFormat --batch-mode

      - name: Upload diagram-converter artifacts
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: diagram-converter
          path: |
            diagram-converter/core/target/camunda-7-to-8-diagram-converter-core-*.jar
            diagram-converter/webapp/target/camunda-7-to-8-diagram-converter-webapp-*.jar
            diagram-converter/cli/target/camunda-7-to-8-diagram-converter-cli-*.jar
          if-no-files-found: error
          retention-days: 7

  # Compile-check all modules against the previous Camunda 8 version
  # to catch API-level incompatibilities before merge.
  compile-previous-version:
    needs: [read-versions, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.run-compile-previous-version == 'true'
    outputs:
      maven-cache-hit: ${{ steps.setup-maven.outputs.maven-cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        id: setup-maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Compile-check against previous Camunda 8 version
        # Compiles all modules (except cockpit plugin which requires Node.js and
        # assembly which is packaging-only) against the previous version to detect incompatible API usage.
        run: >-
          mvn compile test-compile
          -Dversion.camunda-8=${{ needs.read-versions.outputs.camunda-8-previous-version }}
          -Dc8.api=previous
          -pl '!data-migrator/plugins/cockpit,!data-migrator/assembly'
          --batch-mode

  it-runtime-h2:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # Split the runtime suite into 4 parallel shards (was 1 serial job, ~53 min).
    # Each shard name matches its Maven profile (runtime-<shard>) and describes
    # the sub-set of test packages it covers.
    strategy:
      fail-fast: false
      matrix:
        shard:
          - core          # runtime root + persistence + distribution (catch-all for new packages)
          - element       # runtime.element + runtime.datasource
          - jobtype       # runtime.jobtype + runtime.tenant
          - variables     # runtime.variables
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name != 'pull_request' ||
      (
        github.event_name == 'pull_request' &&
        (
          contains(github.event.pull_request.labels.*.name, 'ci:runtime') ||
          (
            needs.detect-changes.outputs.run-runtime == 'true' &&
            !contains(github.event.pull_request.labels.*.name, 'ci:history') &&
            !contains(github.event.pull_request.labels.*.name, 'ci:identity')
          )
        )
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        id: setup-maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run ${{ matrix.shard }} runtime tests with H2
        working-directory: data-migrator
        run: mvn verify -Pintegration,runtime-${{ matrix.shard }}

  it-history-h2:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      maven-cache-hit: ${{ steps.setup-maven.outputs.maven-cache-hit }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name != 'pull_request' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'ci:history') ||
        (
          needs.detect-changes.outputs.run-history == 'true' &&
          !contains(github.event.pull_request.labels.*.name, 'ci:runtime') &&
          !contains(github.event.pull_request.labels.*.name, 'ci:identity')
        )
      ))
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        id: setup-maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run history tests with H2
        working-directory: data-migrator
        run: mvn verify -Pintegration,history-only

  # Determine which databases to test based on PR labels
  prepare-db-matrix:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
        needs.detect-changes.outputs.run-db-default == 'true' ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:postgresql') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:oracle') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:mysql') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:mariadb') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:sqlserver') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:all')
      ))
    outputs:
      databases: ${{ steps.set-matrix.outputs.databases }}
    steps:
      - name: Build database matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:all') }}" == "true" ]]; then
            echo 'databases=["postgresql","oracle","mysql","mariadb","sqlserver"]' >> "$GITHUB_OUTPUT"
          else
            databases=()
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:postgresql') }}" == "true" ]]; then
              databases+=("postgresql")
            fi
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:oracle') }}" == "true" ]]; then
              databases+=("oracle")
            fi
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:mysql') }}" == "true" ]]; then
              databases+=("mysql")
            fi
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:mariadb') }}" == "true" ]]; then
              databases+=("mariadb")
            fi
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:sqlserver') }}" == "true" ]]; then
              databases+=("sqlserver")
            fi
            if [[ ${#databases[@]} -eq 0 ]] && [[ "${{ needs.detect-changes.outputs.run-db-default }}" == "true" ]]; then
              databases+=("postgresql")
            fi
            json=$(printf '%s\n' "${databases[@]}" | jq -R . | jq -sc .)
            echo "databases=$json" >> "$GITHUB_OUTPUT"
          fi

  # Runtime integration tests for non-H2 databases (label-gated on PRs)
  it-runtime-db:
    needs: prepare-db-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        database: ${{ fromJSON(needs.prepare-db-matrix.outputs.databases) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run runtime tests with ${{ matrix.database }}
        working-directory: data-migrator
        run: mvn verify -P${{ matrix.database }},integration,runtime-only

  # History integration tests for non-H2 databases (label-gated on PRs)
  it-history-db:
    needs: prepare-db-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        database: ${{ fromJSON(needs.prepare-db-matrix.outputs.databases) }}
    steps:
      - name: Checkout code
