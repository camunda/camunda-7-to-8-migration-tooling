name: CI
on:
  push:
    branches:
      - main
      - maintenance/*
  pull_request:
    branches:
      - main
      - maintenance/*
      - release/*
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1-5"

jobs:
  # Detects whether data-migrator source changed so downstream jobs can skip
  # expensive tests on PRs that only touch other modules. For non-PR events
  # (push to main, schedule, workflow_dispatch) we always consider it changed.
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      data-migrator: ${{ steps.filter.outputs.data-migrator }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check for data-migrator changes
        id: filter
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT: ${{ github.event_name }}
        run: |
          if [[ "$EVENT" != "pull_request" ]]; then
            echo "data-migrator=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${BASE_REF}" --depth=1
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE '^(data-migrator/|pom\.xml$)'; then
            echo "data-migrator=true" >> "$GITHUB_OUTPUT"
          else
            echo "data-migrator=false" >> "$GITHUB_OUTPUT"
          fi

  distro:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Build and run default tests
        working-directory: data-migrator
        run: mvn clean install -Dmaven.test.skip --batch-mode

      - name: Collect distro
        id: distro
        if: github.ref == 'refs/heads/main'
        run: |
          ARTIFACT_DIR=$(mktemp -d)
          cp data-migrator/assembly/target/camunda-7-to-8-data-migrator-*.tar.gz "${ARTIFACT_DIR}/"
          cp data-migrator/assembly/target/camunda-7-to-8-data-migrator-*.zip "${ARTIFACT_DIR}/"
          echo "dir=${ARTIFACT_DIR}" >> $GITHUB_OUTPUT

      - name: Upload distro
        uses: actions/upload-artifact@v6
        if: github.ref == 'refs/heads/main'
        with:
          name: distro
          path: ${{ steps.distro.outputs.dir }}
          retention-days: 7

  code-conversion:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus USER | NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus PASSWORD | NEXUS_APP_CAMUNDA_COM_PSW;
            secret/data/products/cambpm/ci/harbor username | HARBOR_USERNAME;
            secret/data/products/cambpm/ci/harbor password | HARBOR_PASSWORD;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Login to Camunda Registry
        uses: docker/login-action@v4
        with:
          registry: registry.camunda.cloud
          username: ${{ steps.secrets.outputs.HARBOR_USERNAME }}
          password: ${{ steps.secrets.outputs.HARBOR_PASSWORD }}

      - name: Build code-conversion module
        working-directory: code-conversion
        run: mvn verify -PcheckFormat --batch-mode

      - name: Set up Node.js for pattern validation
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install pattern dependencies
        working-directory: code-conversion/patterns
        run: npm install

      - name: Validate pattern catalog is up-to-date
        working-directory: code-conversion/patterns
        run: |
          echo "Generating pattern catalog..."
          node generate-catalog.js
          node generate-all-in-one.js
          
          echo "Checking if catalog files are in sync..."
          if ! git diff --exit-code README.md ALL_IN_ONE.md; then
            echo "❌ Pattern catalog is out of sync!"
            exit 1
          fi
          echo "✅ Pattern catalog is up-to-date!"

      - name: Collect code-conversion artifacts
        id: code-conversion-artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          ARTIFACT_DIR=$(mktemp -d)
          cp code-conversion/recipes/target/camunda-7-to-8-code-conversion-recipes-*.jar "${ARTIFACT_DIR}/"
          echo "dir=${ARTIFACT_DIR}" >> $GITHUB_OUTPUT

      - name: Upload code-conversion artifacts
        uses: actions/upload-artifact@v6
        if: github.ref == 'refs/heads/main'
        with:
          name: code-conversion
          path: ${{ steps.code-conversion-artifacts.outputs.dir }}
          retention-days: 7

  diagram-converter:
