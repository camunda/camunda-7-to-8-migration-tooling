name: CI
on:
  push:
    branches:
      - main
      - maintenance/*
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1-5"  # Weekday mornings for general CI

jobs:
  # Read Camunda 8 versions from pom.xml to avoid hard-coding in CI
  read-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      camunda-8-version: ${{ steps.versions.outputs.camunda-8-version }}
      camunda-8-previous-version: ${{ steps.versions.outputs.camunda-8-previous-version }}
      camunda-8-docker-image-version: ${{ steps.versions.outputs.camunda-8-docker-image-version }}
      camunda-8-previous-docker-image-version: ${{ steps.versions.outputs.camunda-8-previous-docker-image-version }}
      camunda-versions: ${{ steps.versions.outputs.camunda-versions }}
    steps:
      - name: Checkout pom.xml
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: pom.xml
          sparse-checkout-cone-mode: false

      - name: Extract Camunda 8 versions from pom.xml
        id: versions
        run: |
          CURRENT=$(sed -n 's/.*<version\.camunda-8>\([^<]*\)<\/version\.camunda-8>.*/\1/p' pom.xml)
          PREVIOUS=$(sed -n 's/.*<version\.camunda-8\.previous>\([^<]*\)<\/version\.camunda-8\.previous>.*/\1/p' pom.xml)
          
          if [ -z "$CURRENT" ]; then
            echo "::error::Failed to extract <version.camunda-8> from pom.xml"
            exit 1
          fi
          
          if [ -z "$PREVIOUS" ]; then
            echo "::error::Failed to extract <version.camunda-8.previous> from pom.xml"
            exit 1
          fi

          # Docker image version: for SNAPSHOT versions, current uses SNAPSHOT and previous uses MAJOR.MINOR-SNAPSHOT
          # For release versions (no -SNAPSHOT suffix), the Docker tag equals the Maven version as-is
          if echo "$CURRENT" | grep -q '\-SNAPSHOT$'; then
            CURRENT_DOCKER="SNAPSHOT"
          else
            CURRENT_DOCKER="$CURRENT"
          fi
          PREVIOUS_DOCKER=$(echo "$PREVIOUS" | sed 's/\([0-9]*\.[0-9]*\)\.[0-9]*-SNAPSHOT/\1-SNAPSHOT/')

          echo "camunda-8-version=${CURRENT}" >> $GITHUB_OUTPUT
          echo "camunda-8-previous-version=${PREVIOUS}" >> $GITHUB_OUTPUT
          echo "camunda-8-docker-image-version=${CURRENT_DOCKER}" >> $GITHUB_OUTPUT
          echo "camunda-8-previous-docker-image-version=${PREVIOUS_DOCKER}" >> $GITHUB_OUTPUT
          echo "camunda-versions=[\"${CURRENT}\",\"${PREVIOUS}\"]" >> $GITHUB_OUTPUT

          echo "Camunda 8 current: ${CURRENT} (docker: ${CURRENT_DOCKER})"
          echo "Camunda 8 previous: ${PREVIOUS} (docker: ${PREVIOUS_DOCKER})"

  distro:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Build and run default tests
        working-directory: data-migrator
        run: mvn clean install -Dmaven.test.skip --batch-mode

      - name: Collect distro
        id: distro
        if: github.ref == 'refs/heads/main'
        run: |
          ARTIFACT_DIR=$(mktemp -d)
          cp data-migrator/assembly/target/camunda-7-to-8-data-migrator-*.tar.gz "${ARTIFACT_DIR}/"
          cp data-migrator/assembly/target/camunda-7-to-8-data-migrator-*.zip "${ARTIFACT_DIR}/"
          echo "dir=${ARTIFACT_DIR}" >> $GITHUB_OUTPUT

      - name: Upload distro
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: distro
          path: ${{ steps.distro.outputs.dir }}
          retention-days: 7

  code-conversion:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Build code-conversion module
        working-directory: code-conversion
        run: mvn verify -PcheckFormat --batch-mode

      - name: Set up Node.js for pattern validation
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Install pattern dependencies
        working-directory: code-conversion/patterns
        run: npm install

      - name: Validate pattern catalog is up-to-date
        working-directory: code-conversion/patterns
        run: |
          echo "Generating pattern catalog..."
          node generate-catalog.js
          node generate-all-in-one.js
          
          echo "Checking if catalog files are in sync..."
          if ! git diff --exit-code README.md ALL_IN_ONE.md; then
            echo "❌ Pattern catalog is out of sync!"
            exit 1
          fi
          echo "✅ Pattern catalog is up-to-date!"

      - name: Build api-mapping frontend
        working-directory: code-conversion/api-mapping
        run: |
          npm ci
          npm run build

      - name: Collect code-conversion artifacts
        id: code-conversion-artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          ARTIFACT_DIR=$(mktemp -d)
          cp code-conversion/recipes/target/camunda-7-to-8-code-conversion-recipes-*.jar "${ARTIFACT_DIR}/"
          echo "dir=${ARTIFACT_DIR}" >> $GITHUB_OUTPUT

      - name: Upload code-conversion artifacts
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: code-conversion
          path: ${{ steps.code-conversion-artifacts.outputs.dir }}
          retention-days: 7

  diagram-converter:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Build and test diagram-converter module
        working-directory: diagram-converter
        run: mvn verify -Pdistro,checkFormat --batch-mode

      - name: Collect diagram-converter artifacts
        id: diagram-converter-artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          ARTIFACT_DIR=$(mktemp -d)
          cp diagram-converter/core/target/camunda-7-to-8-diagram-converter-core-*.jar "${ARTIFACT_DIR}/"
          cp diagram-converter/webapp/target/camunda-7-to-8-diagram-converter-webapp-*.jar "${ARTIFACT_DIR}/"
          cp diagram-converter/cli/target/camunda-7-to-8-diagram-converter-cli-*.jar "${ARTIFACT_DIR}/"
          echo "dir=${ARTIFACT_DIR}" >> $GITHUB_OUTPUT

      - name: Upload diagram-converter artifacts
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: diagram-converter
          path: ${{ steps.diagram-converter-artifacts.outputs.dir }}
          retention-days: 7

  # Compile-check all modules against the previous Camunda 8 version
  # to catch API-level incompatibilities before merge.
  compile-previous-version:
    needs: [read-versions]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Compile-check against previous Camunda 8 version
        # Compiles all modules (except cockpit plugin which requires Node.js and
        # assembly which is packaging-only) against the previous version to detect incompatible API usage.
        run: >-
          mvn compile test-compile
          -Dversion.camunda-8=${{ needs.read-versions.outputs.camunda-8-previous-version }}
          -pl '!data-migrator/plugins/cockpit,!data-migrator/assembly'
          --batch-mode

  it-runtime-h2:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    if: |
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'ci:runtime') ||
        (!contains(github.event.pull_request.labels.*.name, 'ci:runtime') && !contains(github.event.pull_request.labels.*.name, 'ci:history') && !contains(github.event.pull_request.labels.*.name, 'ci:identity'))
      )) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run runtime tests with H2
        working-directory: data-migrator
        run: mvn verify -Pintegration,runtime-only

  it-history-h2:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    if: |
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'ci:history') ||
        (!contains(github.event.pull_request.labels.*.name, 'ci:runtime') && !contains(github.event.pull_request.labels.*.name, 'ci:history') && !contains(github.event.pull_request.labels.*.name, 'ci:identity'))
      )) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run history tests with H2
        working-directory: data-migrator
        run: mvn verify -Pintegration,history-only

  # Determine which databases to test based on PR labels
  prepare-db-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'ci:db:postgresql') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:oracle') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:mysql') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:mariadb') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:sqlserver') ||
        contains(github.event.pull_request.labels.*.name, 'ci:db:all')
      ))
    outputs:
      databases: ${{ steps.set-matrix.outputs.databases }}
    steps:
      - name: Build database matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:all') }}" == "true" ]]; then
            echo 'databases=["postgresql","oracle","mysql","mariadb","sqlserver"]' >> "$GITHUB_OUTPUT"
          else
            databases=()
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:postgresql') }}" == "true" ]]; then
              databases+=("postgresql")
            fi
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:oracle') }}" == "true" ]]; then
              databases+=("oracle")
            fi
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:mysql') }}" == "true" ]]; then
              databases+=("mysql")
            fi
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:mariadb') }}" == "true" ]]; then
              databases+=("mariadb")
            fi
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:db:sqlserver') }}" == "true" ]]; then
              databases+=("sqlserver")
            fi
            json=$(printf '%s\n' "${databases[@]}" | jq -R . | jq -sc .)
            echo "databases=$json" >> "$GITHUB_OUTPUT"
          fi

  # Runtime integration tests for non-H2 databases (label-gated on PRs)
  it-runtime-db:
    needs: prepare-db-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        database: ${{ fromJSON(needs.prepare-db-matrix.outputs.databases) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run runtime tests with ${{ matrix.database }}
        working-directory: data-migrator
        run: mvn verify -P${{ matrix.database }},integration,runtime-only

  # History integration tests for non-H2 databases (label-gated on PRs)
  it-history-db:
    needs: prepare-db-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        database: ${{ fromJSON(needs.prepare-db-matrix.outputs.databases) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run history tests with ${{ matrix.database }}
        working-directory: data-migrator
        run: mvn verify -P${{ matrix.database }},integration,history-only

  it-history-h2-windows:
    runs-on: windows-latest
    timeout-minutes: 70
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'ci:history') ||
        (!contains(github.event.pull_request.labels.*.name, 'ci:runtime') && !contains(github.event.pull_request.labels.*.name, 'ci:history') && !contains(github.event.pull_request.labels.*.name, 'ci:identity'))
      ))
    steps:
      - name: Enable long paths for Git on Windows
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Build and run history tests on Windows
        working-directory: data-migrator
        run: mvn clean install -P'windows,integration' --batch-mode


  it-identity-h2:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    if: |
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'ci:identity') ||
        (!contains(github.event.pull_request.labels.*.name, 'ci:runtime') && !contains(github.event.pull_request.labels.*.name, 'ci:history') && !contains(github.event.pull_request.labels.*.name, 'ci:identity'))
      )) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run identity tests with H2
        working-directory: data-migrator
        run: mvn verify -Pintegration,identity-only

  # Identity integration tests for non-H2 databases (label-gated on PRs)
  it-identity-db:
    needs: prepare-db-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        database: ${{ fromJSON(needs.prepare-db-matrix.outputs.databases) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Run identity tests with ${{ matrix.database }}
        working-directory: data-migrator
        run: mvn verify -P${{ matrix.database }},integration,identity-only

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_USR;
            secret/data/products/cambpm/ci/nexus NEXUS_APP_CAMUNDA_COM_PSW;

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Login to Camunda Registry
        uses: docker/login-action@v4
        with:
          registry: registry.camunda.cloud
          username: ${{ steps.secrets.outputs.NEXUS_APP_CAMUNDA_COM_USR }}
          password: ${{ steps.secrets.outputs.NEXUS_APP_CAMUNDA_COM_PSW }}

      - name: Run E2E tests via Maven
        working-directory: data-migrator
        run: mvn clean install -Pe2e -Dmaven.test.skip --batch-mode
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: data-migrator/qa/e2e-tests/playwright-report/
          retention-days: 7

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-screenshots
          path: data-migrator/qa/e2e-tests/test-results/
          retention-days: 7

  # Nightly: verify code-conversion against previous Camunda 8 version
  code-conversion-previous-version:
