name: Deploy Diagram Converter

on:
  workflow_dispatch:
    inputs:
      RELEASE_VERSION:
        description: "Release version to deploy (e.g., 0.2.0). Must match an existing release tag."
        required: true
        type: string
      IS_DRY_RUN:
        description: "Dry run — build and push image to ECR but skip ECS deployment"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      RELEASE_VERSION:
        required: true
        type: string
      IS_DRY_RUN:
        required: false
        type: boolean
        default: false
      CALLED_FROM_RELEASE:
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-diagram-converter
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ inputs.RELEASE_VERSION }}
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: camunda-model-converter
  ECS_CLUSTER: camunda-model-converter-cluster
  ECS_SERVICE: camunda-model-converter-service

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: diagram-converter-production

    steps:
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/cambpm/ci/github-workflow DIAGRAM_CONVERTER_AWS_DEPLOY_ROLE_ARN;
            secret/data/products/cambpm/ci/github-workflow DIAGRAM_CONVERTER_AWS_ACCOUNT_ID;

      - name: Validate version format
        run: |
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '${RELEASE_VERSION}'. Expected semantic version (e.g., 0.2.0)."
            exit 1
          fi

      - name: Download artifact from workflow run
        if: ${{ inputs.CALLED_FROM_RELEASE }}
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts-${{ inputs.RELEASE_VERSION }}
          path: ./workflow-artifacts

      - name: Prepare artifact from workflow run
        if: ${{ inputs.CALLED_FROM_RELEASE }}
        run: |
          mkdir -p docker-context
          cp "workflow-artifacts/camunda-7-to-8-diagram-converter-webapp-${RELEASE_VERSION}.jar" docker-context/app.jar
          echo "✅ Artifact obtained from workflow artifacts"
          ls -lh docker-context/

      - name: Verify release exists
        if: ${{ !inputs.CALLED_FROM_RELEASE }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${RELEASE_VERSION}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::error::Release '${RELEASE_VERSION}' not found. Ensure the tag exists at https://github.com/${{ github.repository }}/releases"
            exit 1
          fi

      - name: Download release artifact from GitHub
        if: ${{ !inputs.CALLED_FROM_RELEASE }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docker-context
          echo "Downloading webapp JAR from release ${RELEASE_VERSION}..."
          gh release download "${RELEASE_VERSION}" \
            --repo "${{ github.repository }}" \
            --pattern "camunda-7-to-8-diagram-converter-webapp-${RELEASE_VERSION}.jar" \
            --dir docker-context

          mv docker-context/camunda-7-to-8-diagram-converter-webapp-${RELEASE_VERSION}.jar docker-context/app.jar
          echo "✅ Artifact downloaded successfully"
          ls -lh docker-context/

      - name: Create Dockerfile
        run: |
          cat > docker-context/Dockerfile << 'EOF'
          FROM eclipse-temurin:21-jre-alpine
          WORKDIR /app

          # Create non-root user
          RUN addgroup -S -g 1001 appuser && adduser -S -u 1001 -G appuser appuser

          # Copy JAR with correct ownership
          COPY --chown=appuser:appuser app.jar app.jar

          USER appuser
          EXPOSE 8080

          HEALTHCHECK --interval=30s --timeout=5s --start-period=60s --retries=3 \
            CMD wget -q --spider http://localhost:8080/actuator/health || exit 1

          ENTRYPOINT ["java", "-XX:MaxRAMPercentage=75.0", "-jar", "app.jar"]
          EOF

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.secrets.outputs.DIAGRAM_CONVERTER_AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mask AWS account ID
        run: echo "::add-mask::${{ steps.secrets.outputs.DIAGRAM_CONVERTER_AWS_ACCOUNT_ID }}"

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2


      - name: Compute image tags
        id: tags
        env:
          ECR_URI: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
        run: |
          if [[ "${{ inputs.IS_DRY_RUN }}" == "true" ]]; then
            IMAGE_TAG="${RELEASE_VERSION}-dry-run"
            ALIAS_TAG="dry-run"
          else
            IMAGE_TAG="${RELEASE_VERSION}"
            ALIAS_TAG="latest"
          fi
          echo "image-uri=${ECR_URI}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "alias-uri=${ECR_URI}:${ALIAS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./docker-context
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.image-uri }}
            ${{ steps.tags.outputs.alias-uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image in ECR
        run: |
          echo "Verifying image manifest..."
          docker buildx imagetools inspect "${{ steps.tags.outputs.image-uri }}"

      # NOTE: This uses force-new-deployment which relies on the ECS task definition
      # referencing the "latest" tag. If the task definition is changed to pin a specific
      # version tag, this step must be updated to register a new task definition revision.
      - name: Deploy to ECS
        if: ${{ !inputs.IS_DRY_RUN }}
        run: |
          echo "Forcing new ECS deployment..."
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}" \
            --no-cli-pager

      - name: Wait for ECS deployment to stabilize
        if: ${{ !inputs.IS_DRY_RUN }}
        run: |
          echo "Waiting for service to stabilize (this may take a few minutes)..."
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --region "${AWS_REGION}"
          echo "✅ ECS service is stable"

      - name: Verify running task image
        if: ${{ !inputs.IS_DRY_RUN }}
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster "${ECS_CLUSTER}" \
            --service-name "${ECS_SERVICE}" \
            --region "${AWS_REGION}" \
            --query 'taskArns[0]' \
            --output text)

          RUNNING_DIGEST=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --region "${AWS_REGION}" \
            --query 'tasks[0].containers[0].imageDigest' \
            --output text)

          EXPECTED_DIGEST="${{ steps.build.outputs.digest }}"
          echo "Running digest:  ${RUNNING_DIGEST}"
          echo "Expected digest: ${EXPECTED_DIGEST}"

          if [[ "${RUNNING_DIGEST}" == "${EXPECTED_DIGEST}" ]]; then
            echo "✅ Deployment verified — image digest matches"
          else
            echo "::error::Running image digest '${RUNNING_DIGEST}' does not match expected '${EXPECTED_DIGEST}'"
            exit 1
          fi

      - name: Health check
        if: ${{ !inputs.IS_DRY_RUN }}
        run: |
          echo "Checking application health..."
          for i in {1..5}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://diagram-converter.camunda.io/actuator/health || true)
            if [[ "${HTTP_STATUS}" == "200" ]]; then
              echo "✅ Application is healthy (HTTP ${HTTP_STATUS})"
              exit 0
            fi
            echo "Attempt ${i}/5: HTTP ${HTTP_STATUS} — retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check did not return 200 after 5 attempts"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${RELEASE_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry Run** | \`${{ inputs.IS_DRY_RUN }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ steps.tags.outputs.image-uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Alias Tag** | \`${{ steps.tags.outputs.alias-uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECR Repository** | \`${ECR_REPOSITORY}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECS Cluster** | \`${ECS_CLUSTER}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECS Service** | \`${ECS_SERVICE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${AWS_REGION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://diagram-converter.camunda.io |" >> $GITHUB_STEP_SUMMARY
