services:

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=camunda
      - POSTGRES_USER=camunda
      - POSTGRES_PASSWORD=camunda
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camunda -d camunda"]
      interval: 5s
      timeout: 5s
      retries: 5

  camunda8:
    image: camunda/camunda:SNAPSHOT
    ports:
      - "8080:8080"
      - "26500:26500"
      - "9600:9600"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e \"GET /v2/topology HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -n 1 <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    configs:
      - source: camunda8-config
        target: /usr/local/camunda/config/application.yaml

  camunda8-app:
    build: .
    ports:
      - "8090:8090"
    environment:
      - CAMUNDA_CLIENT_MODE=self-managed
      - CAMUNDA_CLIENT_GRPC_ADDRESS=http://camunda8:26500
      - CAMUNDA_CLIENT_REST_ADDRESS=http://camunda8:8080
    depends_on:
      camunda8:
        condition: service_healthy

configs:
  camunda8-config:
    content: |
      camunda:
        system:
          cpu-thread-count: "3"
          io-thread-count: "3"
        security:
          authentication:
            method: "basic"
            unprotectedApi: true
          authorizations:
            enabled: false
          initialization:
            users:
              - username: "demo"
                password: "demo"
                name: "Demo User"
                email: "demo@demo.com"
            defaultRoles.admin.users:
              - "demo"
        data:
          secondary-storage:
            type: rdbms
            rdbms:
              database-vendor-id: "postgresql"
              url: "jdbc:postgresql://postgres:5432/camunda"
              username: "camunda"
              password: "camunda"
